<style>
    .impedance-sim {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        background: #fff;
        color: #333;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .impedance-sim h1 { font-size: 20px; text-align: center; color: #2c3e50; }
    .impedance-sim .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
    .impedance-sim .control-group { display: flex; flex-direction: column; }
    .impedance-sim label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
    .impedance-sim input[type=range] { width: 100%; cursor: pointer; }
    .impedance-sim .val-display { font-weight: normal; color: #007bff; }
    .impedance-sim .data-panel { display: flex; justify-content: space-between; margin-top: 20px; gap: 15px; }
    .impedance-sim .card { flex: 1; background: #f1f5f9; padding: 15px; border-radius: 8px; border-left: 5px solid #3b82f6; }
    .impedance-sim .card.joint2 { border-left-color: #f59e0b; }
    .impedance-sim .card h3 { margin: 0 0 10px 0; font-size: 16px; }
    .impedance-sim .card p { margin: 5px 0; font-family: monospace; font-size: 15px; }
    .impedance-sim canvas { width: 100%; height: 300px; background: #fff; border: 1px solid #cbd5e1; border-radius: 5px; margin-top: 10px; }
    .impedance-sim .legend { display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 14px; flex-wrap: wrap; }
    .impedance-sim .legend-item { display: flex; align-items: center; gap: 5px; }
    .impedance-sim .line-solid { width: 30px; height: 3px; background: #3b82f6; }
    .impedance-sim .line-dashed { width: 30px; height: 0; border-top: 3px dashed #f59e0b; }
    @media (max-width: 768px) {
        .impedance-sim .controls,
        .impedance-sim .data-panel {
            grid-template-columns: 1fr;
            flex-direction: column;
        }
    }
</style>

<div class="container impedance-sim">
    <h1>二阶系统响应与控制参数解耦演示</h1>
    
    <div class="controls">
        <div class="control-group">
            <label>自然频率 ω (响应快慢): <span id="omega-val" class="val-display">10</span> rad/s</label>
            <input type="range" id="omega" min="1" max="30" step="0.5" value="10">
        </div>
        <div class="control-group">
            <label>阻尼比 ξ (响应形态): <span id="xi-val" class="val-display">2.0</span></label>
            <input type="range" id="xi" min="0.1" max="3.0" step="0.1" value="2.0">
        </div>
        <div class="control-group">
            <label>关节1惯量 I₁ (轻巧): <span id="i1-val" class="val-display">0.05</span> kg·m²</label>
            <input type="range" id="i1" min="0.01" max="0.2" step="0.01" value="0.05">
        </div>
        <div class="control-group">
            <label>关节2惯量 I₂ (沉重): <span id="i2-val" class="val-display">0.8</span> kg·m²</label>
            <input type="range" id="i2" min="0.2" max="2.0" step="0.05" value="0.8">
        </div>
    </div>

    <canvas id="plotCanvas" width="860" height="300"></canvas>
    
    <div class="legend">
        <div class="legend-item"><div class="line-solid"></div> 关节1实际轨迹 (由于完全一致，它可能会被盖住)</div>
        <div class="legend-item"><div class="line-dashed"></div> 关节2实际轨迹</div>
    </div>

    <div class="data-panel">
        <div class="card">
            <h3>🤖 关节1 (轻巧执行器)</h3>
            <p>所需刚度 Kp = <span id="kp1">0.00</span></p>
            <p>所需阻尼 Kd = <span id="kd1">0.00</span></p>
        </div>
        <div class="card joint2">
            <h3>🦾 关节2 (沉重执行器)</h3>
            <p>所需刚度 Kp = <span id="kp2">0.00</span></p>
            <p>所需阻尼 Kd = <span id="kd2">0.00</span></p>
        </div>
    </div>
</div>

<script>
    // 获取DOM元素
    const domIds = ['omega', 'xi', 'i1', 'i2'];
    const inputs = {};
    const displays = {};
    domIds.forEach(id => {
        inputs[id] = document.getElementById(id);
        displays[id] = document.getElementById(id + '-val');
        inputs[id].addEventListener('input', update);
    });

    const canvas = document.getElementById('plotCanvas');
    const ctx = canvas.getContext('2d');

    // 计算二阶系统单位阶跃响应
    function stepResponse(t, omega, xi) {
        if (t === 0) return 0;
        
        if (xi < 1.0) {
            // 欠阻尼 Underdamped
            const wd = omega * Math.sqrt(1 - xi * xi);
            const phi = Math.acos(xi);
            return 1 - (Math.exp(-xi * omega * t) / Math.sqrt(1 - xi * xi)) * Math.sin(wd * t + phi);
        } else if (Math.abs(xi - 1.0) < 0.01) {
            // 临界阻尼 Critically damped
            return 1 - Math.exp(-omega * t) * (1 + omega * t);
        } else {
            // 过阻尼 Overdamped
            const s1 = -omega * (xi - Math.sqrt(xi * xi - 1));
            const s2 = -omega * (xi + Math.sqrt(xi * xi - 1));
            return 1 - (s2 * Math.exp(s1 * t) - s1 * Math.exp(s2 * t)) / (s2 - s1);
        }
    }

    function drawPlot(omega, xi) {
        const width = canvas.width;
        const height = canvas.height;
        ctx.clearRect(0, 0, width, height);

        // 绘图设置
        const timeMax = 1.5; // 模拟1.5秒
        const yMax = 2.0;    // Y轴高度
        const marginX = 40;
        const marginY = 20;
        const plotW = width - marginX * 2;
        const plotH = height - marginY * 2;

        // 画网格和坐标轴
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 1;
        ctx.beginPath();
        // 目标基准线 (y=1)
        const yTarget = marginY + plotH - (1.0 / yMax) * plotH;
        ctx.moveTo(marginX, yTarget);
        ctx.lineTo(width - marginX, yTarget);
        ctx.stroke();
        
        ctx.fillStyle = '#94a3b8';
        ctx.font = '12px sans-serif';
        ctx.fillText('目标 (1.0)', 5, yTarget + 4);

        // 核心绘图逻辑：不管I1和I2是多少，轨迹只由omega和xi决定！
        const steps = 200;
        const points = [];
        for (let i = 0; i <= steps; i++) {
            const t = (i / steps) * timeMax;
            const y = stepResponse(t, omega, xi);
            
            const px = marginX + (t / timeMax) * plotW;
            const py = marginY + plotH - (y / yMax) * plotH;
            points.push({x: px, y: py});
        }

        // 画关节1曲线 (实线，蓝色)
        ctx.beginPath();
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 4;
        ctx.setLineDash([]);
        points.forEach((p, index) => {
            if(index === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();

        // 画关节2曲线 (虚线，橙色，为了显示重叠故意画在同一个位置)
        ctx.beginPath();
        ctx.strokeStyle = '#f59e0b';
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 8]);
        points.forEach((p, index) => {
            if(index === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();
        ctx.setLineDash([]); // 恢复实线
    }

    function update() {
        // 读取滑块值
        const w = parseFloat(inputs.omega.value);
        const x = parseFloat(inputs.xi.value);
        const i1 = parseFloat(inputs.i1.value);
        const i2 = parseFloat(inputs.i2.value);

        // 更新数值显示
        displays.omega.innerText = w.toFixed(1);
        displays.xi.innerText = x.toFixed(1);
        displays.i1.innerText = i1.toFixed(2);
        displays.i2.innerText = i2.toFixed(2);

        // 根据启发式公式计算控制增益: kp = I*w^2, kd = 2*I*xi*w
        const kp1 = i1 * w * w;
        const kd1 = 2 * i1 * x * w;
        
        const kp2 = i2 * w * w;
        const kd2 = 2 * i2 * x * w;

        // 更新面板数据
        document.getElementById('kp1').innerText = kp1.toFixed(2);
        document.getElementById('kd1').innerText = kd1.toFixed(2);
        document.getElementById('kp2').innerText = kp2.toFixed(2);
        document.getElementById('kd2').innerText = kd2.toFixed(2);

        // 重绘图表
        drawPlot(w, x);
    }

    // 初始化运行
    update();
</script>
